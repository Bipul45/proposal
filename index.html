<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="container">

    <div class="progress">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <div class="card">

        <h2 id="title">
            Ek chhota sa sawal...
        </h2>

        <p id="question">
            Agar koi tumhari smile ki wajah banna chahe,
            toh tum kya kahogi?
        </p>

        <div class="buttons">

            <button id="yesBtn">
                Batao ❤️
            </button>

            <button id="noBtn">
                Next →
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
